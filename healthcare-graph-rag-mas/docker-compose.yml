services:
  api:
    build:
      context: ./backend
    environment:
      APP_ENV: docker
      DATABASE_URL: postgresql://health:health@postgres:5432/healthrag
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: healthgraph
      OLLAMA_BASE_URL: http://ollama:11434
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
      MEM0_ENABLED: "false"
      NEMO_GUARDRAILS_CONFIG: /app/guardrails
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      ollama:
        condition: service_started
      phoenix:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
      - ./infra/nemo:/app/guardrails:ro

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: health
      POSTGRES_PASSWORD: health
      POSTGRES_DB: healthrag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health -d healthrag"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/healthgraph
    volumes:
      - neo4jdata:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama:/root/.ollama

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"

volumes:
  pgdata:
  neo4jdata:
  ollama:
