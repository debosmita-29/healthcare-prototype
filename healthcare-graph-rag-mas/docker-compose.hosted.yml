services:
  api:
    build:
      context: ./backend
      args:
        REQUIREMENTS_FILE: requirements-hosted.txt
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_NAME: ${APP_NAME:-Healthcare Graph RAG MAS}
      DATABASE_URL: postgresql://${POSTGRES_USER:-health}:${POSTGRES_PASSWORD:-healthgraph-change-me}@postgres:5432/${POSTGRES_DB:-healthrag}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-healthgraph-change-me}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:6006
      MEM0_ENABLED: ${MEM0_ENABLED:-true}
      MEM0_VECTOR_STORE_PROVIDER: qdrant
      MEM0_QDRANT_HOST: qdrant
      MEM0_QDRANT_PORT: 6333
      NEMO_GUARDRAILS_CONFIG: /app/guardrails
      USE_LIVE_EXTERNAL_APIS: ${USE_LIVE_EXTERNAL_APIS:-true}
      EXTERNAL_API_TIMEOUT_SECONDS: ${EXTERNAL_API_TIMEOUT_SECONDS:-15}
      NCBI_API_KEY: ${NCBI_API_KEY:-}
      OPENFDA_API_KEY: ${OPENFDA_API_KEY:-}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      ollama:
        condition: service_started
      phoenix:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
      - ./infra/nemo:/app/guardrails:ro

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-health}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-healthgraph-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-healthrag}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-health} -d ${POSTGRES_DB:-healthrag}"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-healthgraph-change-me}
    ports:
      - "${NEO4J_HTTP_BIND_ADDR:-127.0.0.1}:${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_BIND_ADDR:-127.0.0.1}:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4jdata:/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "${OLLAMA_BIND_ADDR:-127.0.0.1}:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama:/root/.ollama

  phoenix:
    image: arizephoenix/phoenix:latest
    restart: unless-stopped
    ports:
      - "${PHOENIX_BIND_ADDR:-127.0.0.1}:${PHOENIX_PORT:-6006}:6006"
    volumes:
      - phoenixdata:/mnt/data

  qdrant:
    image: qdrant/qdrant:v1.12.6
    restart: unless-stopped
    ports:
      - "${QDRANT_BIND_ADDR:-127.0.0.1}:${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  neo4jdata:
  ollama:
  phoenixdata:
  qdrantdata:
